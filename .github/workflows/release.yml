name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: configure Rust
        run: rustup default stable

      - name: install frontend dependencies
        run: npm install

      - name: sync version to tauri.conf.json
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "github.ref_name=${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const ref = process.env.GITHUB_REF || '';
            const v = ref.replace('refs/tags/v', '').replace('refs/tags/', '');
            console.log('version:', v);
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            c.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
            console.log('Updated tauri.conf.json version to:', v);
          "

      - name: build tauri
        run: npm run tauri build

      - name: check bundle output
        run: dir /s /b src-tauri\target\release\bundle\*

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: src-tauri/target/release/bundle

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: configure Rust
        run: rustup default stable

      - name: install frontend dependencies
        run: npm install

      - name: sync version to tauri.conf.json
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "github.ref_name=${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const ref = process.env.GITHUB_REF || '';
            const v = ref.replace('refs/tags/v', '').replace('refs/tags/', '');
            console.log('version:', v);
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            c.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
            console.log('Updated tauri.conf.json version to:', v);
          "

      - name: build tauri
        run: npm run tauri build

      - name: check bundle output
        run: ls -la src-tauri/target/release/bundle/**

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: src-tauri/target/release/bundle

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: configure Rust
        run: rustup default stable

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - name: sync version to tauri.conf.json
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "github.ref_name=${{ github.ref_name }}"
          node -e "
            const fs = require('fs');
            const ref = process.env.GITHUB_REF || '';
            const v = ref.replace('refs/tags/v', '').replace('refs/tags/', '');
            console.log('version:', v);
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            c.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2) + '\n');
            console.log('Updated tauri.conf.json version to:', v);
          "

      - name: build tauri
        run: npm run tauri build

      - name: check bundle output
        run: ls -la src-tauri/target/release/bundle/**

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: src-tauri/target/release/bundle

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: find artifacts -type f -name "*.exe" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.AppImage" -o -name "*.deb" 2>/dev/null | head -20

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'My-tools ${{ github.ref_name }}'
          body: 'GitHub Actions 自动生成的跨平台安装包。'
          draft: true
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
